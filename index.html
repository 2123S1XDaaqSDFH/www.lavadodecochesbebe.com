<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>tecnibaby | limpieza premium</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{--brand:#FA008A;}

body{background:#050505;color:white;font-family:'Outfit';}

.brand{font-weight:300;letter-spacing:-1px;text-transform:lowercase;}

.hero{
height:100vh;
background:linear-gradient(to bottom, rgba(0,0,0,.5), #050505),
url('./coches.jpg');
background-size:cover;
display:flex;
align-items:center;
}

.btn{background:var(--brand);padding:12px 25px;border-radius:10px;}
.btn:hover{transform:scale(1.05);}

/* ANTES DESPUES */
.compare{
position:relative;
overflow:hidden;
}
.compare img{
width:100%;
display:block;
}
.after{
position:absolute;
top:0;
left:0;
width:50%;
overflow:hidden;
}
.slider{
position:absolute;
top:0;
left:50%;
width:3px;
height:100%;
background:white;
cursor:ew-resize;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;height:60px;
display:flex;align-items:center;justify-content:center;
border-radius:50%;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed w-full flex justify-between p-6 bg-black/50 backdrop-blur">
<div class="flex items-center gap-2">
<img src="./logo.png" class="h-10">
<span class="brand text-lg">tecnibaby</span>
</div>

<a href="https://wa.me/573172244861?text=Hola%20quiero%20información%20sobre%20limpieza%20de%20coches"
class="btn text-xs">agendar</a>
</nav>

<!-- HERO -->
<section class="hero px-6">
<div>
<h1 class="brand text-7xl">limpieza premium</h1>
<p class="mt-4 text-gray-300">protege la salud de tu bebé</p>

<a href="https://wa.me/573172244861?text=Quiero%20agendar%20un%20servicio"
class="btn mt-6 inline-block">Agenda Tu Cita Ahora</a>
</div>
</section>

<!-- ANTES DESPUES -->
<section class="py-20 px-6">
<h2 class="text-4xl mb-10">antes / después</h2>

<div class="compare max-w-3xl mx-auto">
<img src="antes.jpg">
<div class="after" id="after">
<img src="despues.jpg">
</div>
<div class="slider" id="slider"></div>
</div>
</section>

<!-- RESEÑAS -->
<section class="py-20 px-6 bg-zinc-950">
<h2 class="text-4xl text-center mb-10">clientes</h2>

<div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">

<div>
<p>"quedó como nuevo"</p>
<span>- Laura Gómez</span>
</div>

<div>
<p>"excelente servicio"</p>
<span>- Andrés Ruiz</span>
</div>

<div>
<p>"100% recomendado"</p>
<span>- Valentina Pérez</span>
</div>

</div>
</section>

<!-- FORM -->
<section class="py-20 px-6 text-center">

<h2 class="text-3xl mb-6">Solicita Nuestra Asesoría</h2>

<form onsubmit="sendToWhatsApp(event)" class="max-w-md mx-auto">

<input id="name" placeholder="nombre" class="w-full mb-3 p-3 bg-black border border-gray-600">
<input id="phone" placeholder="teléfono" class="w-full mb-3 p-3 bg-black border border-gray-600">
<textarea id="msg" placeholder="mensaje" class="w-full mb-3 p-3 bg-black border border-gray-600"></textarea>

<button class="btn w-full">enviar</button>

</form>

</section>

<!-- WHATSAPP -->
<a href="https://wa.me/573172244861" class="whatsapp">💬</a>

<!-- SCRIPT -->
<script>

/* ANIMACIONES */
gsap.from("h1",{opacity:0,y:50,duration:1});

/* ANTES DESPUES */
const slider=document.getElementById('slider');
const after=document.getElementById('after');

slider.addEventListener('mousemove',(e)=>{
let rect=slider.parentElement.getBoundingClientRect();
let x=e.clientX-rect.left;
after.style.width=x+"px";
slider.style.left=x+"px";
});

/* FORM A WHATSAPP */
function sendToWhatsApp(e){
e.preventDefault();

let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let msg=document.getElementById('msg').value;

let text=`Hola soy ${name}, Mi teléfono es ${phone}.y requiero ${msg}`;
window.open(`https://wa.me/573172244861?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
