<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tecnibaby | premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{--brand:#FA008A;}
body{background:#0a0a0a;color:white;font-family:sans-serif}

/* LOADER */
#loader{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

/* CHAT */
.chat{
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:#111;
border-radius:10px;
padding:10px;
}

.chatbox{
height:200px;
overflow:auto;
font-size:12px;
margin-bottom:5px;
}

.input{width:100%;padding:8px;background:#222;border:none;color:white}
.btn{background:#FA008A;padding:8px 12px;border-radius:6px}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1 style="font-size:40px">tecnibaby</h1>
<p>cargando...</p>
</div>

<!-- HERO -->
<section style="height:100vh;background:url('./coches.jpg') center/cover;display:flex;align-items:center;justify-content:center;text-align:center">
<div>
<h1 style="font-size:50px">limpieza premium</h1>
<p>protege la salud de tu bebé</p>
<a href="https://wa.me/573172244861" class="btn">agendar</a>
</div>
</section>

<!-- TRACKING -->
<section style="padding:40px;text-align:center">
<h2>Consultar pedido</h2>

<input id="buscar" class="input" placeholder="ID pedido">
<button onclick="buscarPedido()" class="btn">buscar</button>

<div id="resultado"></div>
</section>

<!-- CHATBOT -->
<div class="chat">
<div id="chatbox" class="chatbox"></div>

<input id="chatInput" class="input" placeholder="escribe...">
<button onclick="responder()" class="btn">enviar</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCOHS3_iAgeABkBAR2QX3N4_nGRS0EODeA",
authDomain: "tecnibaby-48685.firebaseapp.com",
projectId: "tecnibaby-48685"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.buscarPedido = async function(){

let id=document.getElementById("buscar").value;

let snap = await getDoc(doc(db,"pedidos",id));

if(!snap.exists()){
document.getElementById("resultado").innerText="no encontrado";
return;
}

let data=snap.data();

document.getElementById("resultado").innerHTML=`
<p>${data.nombre}</p>
<p>${data.telefono}</p>
<p>Estado: ${data.estado}</p>
`;
}
</script>

<!-- CHATBOT SCRIPT -->
<script>
async function responder(){

let input=document.getElementById("chatInput");
let texto=input.value;

let box=document.getElementById("chatbox");

box.innerHTML+=`<div>Tú: ${texto}</div>`;

let res=await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({message:texto})
});

let data=await res.json();

box.innerHTML+=`<div>Bot: ${data.reply}</div>`;

input.value="";
}

/* LOADER */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);
</script>

</body>
</html>
